services:
  - type: web
    name: xeno-crm-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push && npm run start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: Gemini_API_KEY
        sync: false
      - key: CHANNEL_SERVICE_URL
        sync: false
        # Note: Set this to the public URL of the xeno-crm-channel-service once deployed, e.g., https://xeno-crm-channel-service.onrender.com
        # Or you can use the internal Render URL if configured, e.g., http://xeno-crm-channel-service:6001

  - type: web
    name: xeno-crm-channel-service
    env: node
    plan: free
    rootDir: channel-service
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 6001
      - key: BACKEND_URL
        sync: false
        # Note: Set this to the public URL of the xeno-crm-backend once deployed, e.g., https://xeno-crm-backend.onrender.com
        # Or you can use the internal Render URL if configured, e.g., http://xeno-crm-backend:5000
