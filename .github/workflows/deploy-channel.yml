name: Deploy Channel Service

on:
  push:
    branches:
      - main
    paths:
      - 'channel-service/**'
      - '.github/workflows/deploy-channel.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'channel-service/package-lock.json'

      - name: Install Dependencies
        run: |
          cd channel-service
          npm ci

      - name: Build Channel Service
        run: |
          cd channel-service
          npm run build

      - name: Pack Application
        run: |
          cd channel-service
          tar -czf channel-service.tar.gz dist package.json package-lock.json

      - name: Transfer Tarball to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          scp -i ~/.ssh/id_rsa channel-service/channel-service.tar.gz $USER@$HOST:/var/www/xeno-crm/channel-service/

      - name: SSH and Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/xeno-crm/channel-service
            
            # Extract tarball
            tar -xzf channel-service.tar.gz
            rm channel-service.tar.gz
            
            # Install production dependencies
            npm install --omit=dev
            
            # Create .env file
            cat << 'EOF' > .env
            PORT=6001
            BACKEND_URL=http://localhost:5000
            EOF
            
            # Start or restart process via PM2
            pm2 describe channel-service > /dev/null && pm2 restart channel-service || pm2 start dist/server.js --name channel-service
            
            # Save PM2 process list to restore on reboot
            pm2 save
