name: Deploy Backend to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            channel-service/package-lock.json

      # 1. Build main backend
      - name: Install & Build Backend
        run: |
          cd backend
          npm ci
          npm run build

      # 2. Build channel-service
      - name: Install & Build Channel Service
        run: |
          cd channel-service
          npm ci
          npm run build

      # 3. Zip files for Elastic Beanstalk deployment
      # We only include the compiled JavaScript (dist/), package configurations, migration utilities, and the root orchestrators.
      - name: Generate Deployment Zip
        run: |
          zip -r deploy.zip \
            backend/dist \
            backend/package.json \
            backend/prisma \
            backend/prisma-migrate.js \
            channel-service/dist \
            channel-service/package.json \
            package.json \
            start-all.js

      # 4. Deploy deployment package to AWS Elastic Beanstalk
      - name: Deploy to AWS Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: xeno-crm-backend
          environment_name: xeno-crm-backend-env
          version_label: "deploy-${{ github.sha }}-${{ github.run_number }}"
          region: ${{ secrets.AWS_REGION }}
          deployment_package: deploy.zip
          use_existing_version_if_available: true
