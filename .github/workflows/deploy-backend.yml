name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Build Backend
        run: |
          cd backend
          npm run build

      - name: Pack Application
        run: |
          cd backend
          tar -czf backend.tar.gz dist package.json package-lock.json prisma prisma-migrate.js

      - name: Transfer Tarball to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          scp -i ~/.ssh/id_rsa backend/backend.tar.gz $USER@$HOST:/var/www/xeno-crm/backend/

      - name: SSH and Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/xeno-crm/backend
            
            # Extract tarball
            tar -xzf backend.tar.gz
            rm backend.tar.gz
            
            # Install production dependencies
            npm install --omit=dev
            
            # Generate Prisma Client
            npx prisma generate
            
            # Create .env file with production secrets
            cat << 'EOF' > .env
            DATABASE_URL="${{ secrets.DATABASE_URL }}"
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
            Gemini_API_KEY="${{ secrets.GEMINI_API_KEY }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            PORT=5000
            CHANNEL_SERVICE_URL=http://localhost:6001
            EOF
            
            # Run migrations
            npm run migrate
            
            # Start or restart process via PM2
            pm2 describe backend > /dev/null && pm2 restart backend || pm2 start dist/server.js --name backend
            
            # Save PM2 process list to restore on reboot
            pm2 save
