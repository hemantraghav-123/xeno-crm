name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: /api
        run: |
          cd frontend
          npm run build

      - name: Pack Application
        run: |
          cd frontend
          tar -czf frontend.tar.gz .next public package.json package-lock.json

      - name: Transfer Tarball to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          scp -i ~/.ssh/id_rsa frontend/frontend.tar.gz $USER@$HOST:/var/www/xeno-crm/frontend/

      - name: SSH and Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/xeno-crm/frontend
            
            # Extract tarball
            tar -xzf frontend.tar.gz
            rm frontend.tar.gz
            
            # Install production dependencies
            npm install --omit=dev
            
            # Start or restart process via PM2
            pm2 describe frontend > /dev/null && pm2 restart frontend || pm2 start npm --name frontend -- start
            
            # Save PM2 process list to restore on reboot
            pm2 save
